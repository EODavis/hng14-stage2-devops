name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:

# ════════════════════════════════════════════════════════════════════
# STAGE 1 — LINT
# ════════════════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python lint ──────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python — api
        run: flake8 api/ --config api/setup.cfg

      - name: Lint Python — worker
        run: flake8 worker/ --max-line-length=120

      # ── JavaScript lint ──────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Lint JavaScript — frontend
        run: cd frontend && npm run lint

      # ── Dockerfile lint ──────────────────────────────────────────
      - name: Install Hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile


# ════════════════════════════════════════════════════════════════════
# STAGE 2 — TEST
# ════════════════════════════════════════════════════════════════════
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            fastapi==0.111.0 \
            uvicorn==0.30.1 \
            redis==5.0.4 \
            anyio==4.4.0 \
            starlette==0.37.2 \
            pytest \
            pytest-cov \
            httpx

      - name: Run unit tests with coverage
        run: |
          cd api
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-omit=tests/*

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml


# ════════════════════════════════════════════════════════════════════
# STAGE 3 — BUILD & PUSH TO LOCAL REGISTRY
# ════════════════════════════════════════════════════════════════════
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest
          network: host

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest
          network: host

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest
          network: host

      - name: Confirm images in registry
        run: |
          curl -s http://localhost:5000/v2/_catalog | python3 -m json.tool


# ════════════════════════════════════════════════════════════════════
# STAGE 4 — SECURITY SCAN
# ════════════════════════════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb \
            $(lsb_release -sc) main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      # Build images locally for scanning
      # (registry from previous job is gone — each job is a fresh runner)
      - name: Build images for scanning
        run: |
          docker build -t api:latest ./api
          docker build -t worker:latest ./worker
          docker build -t frontend:latest ./frontend

      - name: Scan API image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output api-scan.sarif \
            api:latest
        continue-on-error: false

      - name: Scan Worker image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output worker-scan.sarif \
            worker:latest
        continue-on-error: false

      - name: Scan Frontend image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output frontend-scan.sarif \
            frontend:latest
        continue-on-error: false

      - name: Upload SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"


# ════════════════════════════════════════════════════════════════════
# STAGE 5 — INTEGRATION TEST
# ════════════════════════════════════════════════════════════════════
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env for test
        run: |
          cat > .env << 'ENVEOF'
          REDIS_PORT=6379
          SECRET_KEY=ci-integration-test-secret
          DEBUG=false
          API_URL=http://api:8000
          FRONTEND_PORT=3000
          ENVEOF

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for all services healthy
        run: |
          echo "Waiting for stack to be ready..."
          for i in $(seq 1 24); do
            UNHEALTHY=$(docker compose ps --format json \
              | python3 -c "
          import sys, json
          data = sys.stdin.read().strip()
          services = [json.loads(l) for l in data.splitlines() if l.strip()]
          not_healthy = [s['Name'] for s in services
                         if s.get('Health','') not in ('healthy','')]
          print('\n'.join(not_healthy))
              " 2>/dev/null)
            if [ -z "$UNHEALTHY" ]; then
              echo "All services healthy after $((i*5)) seconds"
              break
            fi
            echo "Still waiting: $UNHEALTHY"
            sleep 5
          done
          docker compose ps

      - name: Submit a job
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:3000/submit \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Response: $RESPONSE"
          JOB_ID=$(echo "$RESPONSE" | python3 -c \
            "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll until job completes
        run: |
          echo "Polling job: $JOB_ID"
          for i in $(seq 1 15); do
            RESPONSE=$(curl -sf http://localhost:3000/status/$JOB_ID)
            STATUS=$(echo "$RESPONSE" | python3 -c \
              "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
            echo "Attempt $i: status = $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Integration test PASSED — job completed successfully"
              exit 0
            fi
            sleep 4
          done
          echo "Integration test FAILED — job did not complete in time"
          docker compose logs
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v


# ════════════════════════════════════════════════════════════════════
# STAGE 6 — DEPLOY (main branch only)
# ════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env for deploy
        run: |
          cat > .env << EOF
          REDIS_PORT=6379
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DEBUG=false
          API_URL=http://api:8000
          FRONTEND_PORT=3000
          EOF

      - name: Build images
        run: docker compose build

      - name: Start base stack (first deploy)
        run: docker compose up -d

      - name: Rolling update with health check guard
        run: |
          for SERVICE in api worker frontend; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Rolling update: $SERVICE"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # Pull/rebuild new image
            docker compose build $SERVICE

            # Start new container alongside old one
            docker compose up -d --no-deps --no-recreate $SERVICE

            # Wait up to 60s for health check to pass
            HEALTHY=false
            for i in $(seq 1 12); do
              HEALTH=$(docker inspect \
                --format='{{.State.Health.Status}}' \
                $(docker compose ps -q $SERVICE) 2>/dev/null | head -1)
              echo "  [$i/12] $SERVICE health: $HEALTH"
              if [ "$HEALTH" = "healthy" ]; then
                HEALTHY=true
                break
              fi
              sleep 5
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "ABORT: $SERVICE failed health check after 60s"
              echo "Old container left running — deploy rolled back"
              docker compose logs $SERVICE
              exit 1
            fi

            echo "$SERVICE updated and healthy"
          done

          echo ""
          echo "Rolling deploy complete"
          docker compose ps
