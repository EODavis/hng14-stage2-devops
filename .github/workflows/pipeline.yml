name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Lint Python api
        run: flake8 api/ --max-line-length=120 --exclude=api/tests,api/__pycache__
      - name: Lint Python worker
        run: flake8 worker/ --max-line-length=120 --exclude=worker/__pycache__
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        run: cd frontend && npm install
      - name: Lint JavaScript frontend
        run: cd frontend && npm run lint
      - name: Install Hadolint
        run: |
          wget -qO /usr/local/bin/hadolint             https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint
      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: >-
          pip install
          fastapi==0.111.0 uvicorn==0.30.1 redis==5.0.4
          anyio==4.4.0 starlette==0.37.2
          pytest pytest-cov httpx
      - name: Run unit tests with coverage
        run: |
          cd api
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest
          network: host
      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest
          network: host
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest
          network: host
      - name: Confirm images in registry
        run: curl -s http://localhost:5000/v2/_catalog | python3 -m json.tool

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy
      - name: Build images for scanning
        run: |
          docker build -t api:latest ./api
          docker build -t worker:latest ./worker
          docker build -t frontend:latest ./frontend
      - name: Scan API image
        run: trivy image --exit-code 1 --severity CRITICAL --format sarif --output api-scan.sarif api:latest
        continue-on-error: true
      - name: Scan Worker image
        run: trivy image --exit-code 1 --severity CRITICAL --format sarif --output worker-scan.sarif worker:latest
        continue-on-error: true
      - name: Scan Frontend image
        run: trivy image --exit-code 1 --severity CRITICAL --format sarif --output frontend-scan.sarif frontend:latest
        continue-on-error: true
      - name: Show vulnerability summary
        if: always()
        run: |
          for IMAGE in api:latest worker:latest frontend:latest; do
            echo "==== $IMAGE ===="
            trivy image --severity CRITICAL --format table "$IMAGE" 2>/dev/null || true
          done
      - name: Upload SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create .env for test
        run: |
          printf 'REDIS_PORT=6379' > .env
          printf 'SECRET_KEY=ci-test-secret' >> .env
          printf 'DEBUG=false' >> .env
          printf 'API_URL=http://api:8000' >> .env
          printf 'FRONTEND_PORT=3000' >> .env
      - name: Start full stack
        run: docker compose up -d --build
      - name: Wait for all services healthy
        run: |
          TOTAL=$(docker compose ps --services | wc -l)
          echo "Expecting $TOTAL healthy services"
          for i in $(seq 1 36); do
            HEALTHY=$(docker compose ps | grep -c "(healthy)" || true)
            echo "Attempt $i/36 — healthy: $HEALTHY / $TOTAL"
            if [ "$HEALTHY" -eq "$TOTAL" ]; then
              echo "All $TOTAL services healthy after $((i*5))s"
              docker compose ps
              exit 0
            fi
            sleep 5
          done
          echo "TIMEOUT — services did not become healthy in 180s"
          docker compose ps
          echo "=== API logs ==="
          docker compose logs api
          echo "=== Worker logs ==="
          docker compose logs worker
          echo "=== Frontend logs ==="
          docker compose logs frontend
          exit 1
      - name: Submit a job
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:3000/submit             -H "Content-Type: application/json" -d '{}')
          echo "Response: $RESPONSE"
          JOB_ID=$(echo "$RESPONSE" | python3 -c             "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV
      - name: Poll until job completes
        run: |
          for i in $(seq 1 15); do
            STATUS=$(curl -sf http://localhost:3000/status/$JOB_ID               | python3 -c               "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
            echo "Attempt $i: status = $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Integration test PASSED"
              exit 0
            fi
            sleep 4
          done
          echo "Integration test FAILED"
          docker compose logs
          exit 1
      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create .env for deploy
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          printf 'REDIS_PORT=6379' > .env
          printf 'SECRET_KEY=%s' "$SECRET_KEY" >> .env
          printf 'DEBUG=false' >> .env
          printf 'API_URL=http://api:8000' >> .env
          printf 'FRONTEND_PORT=3000' >> .env
      - name: Build images
        run: docker compose build
      - name: Start base stack
        run: docker compose up -d
      - name: Rolling update with health check guard
        run: |
          for SERVICE in api worker frontend; do
            echo "Rolling update: $SERVICE"
            docker compose build $SERVICE
            docker compose up -d --no-deps --no-recreate $SERVICE
            HEALTHY=false
            for i in $(seq 1 12); do
              CID=$(docker compose ps -q $SERVICE | head -1)
              HEALTH=$(docker inspect --format="{{.State.Health.Status}}" "$CID" 2>/dev/null)
              echo "  [$i/12] $SERVICE health: $HEALTH"
              if [ "$HEALTH" = "healthy" ]; then
                HEALTHY=true
                break
              fi
              sleep 5
            done
            if [ "$HEALTHY" = "false" ]; then
              echo "ABORT: $SERVICE failed health check"
              docker compose logs $SERVICE
              exit 1
            fi
            echo "$SERVICE updated successfully"
          done
          echo "Deploy complete"
          docker compose ps
