<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Dashboard</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    button { padding: 10px 20px; cursor: pointer; }
    #result { margin-top: 20px; padding: 10px; background: #f4f4f4; border-radius: 4px; }
    #jobs { margin-top: 20px; }
    .job { padding: 8px; border-bottom: 1px solid #ddd; }
    .job.completed { color: green; }
    .job.failed, .job.timed-out { color: red; }
    .job.processing { color: orange; }
  </style>
</head>
<body>
  <h1>Job Processor Dashboard</h1>
  <button onclick="submitJob()">Submit New Job</button>
  <div id="result"></div>
  <div id="jobs"></div>

  <script>
    const jobIds = [];
    const TERMINAL_STATES = ['completed', 'failed', 'error', 'timed out']; // ✅ FIX 17

    async function submitJob() {
      try {                                                     // ✅ FIX 15
        const res = await fetch('/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },     // ✅ FIX 19
          body: JSON.stringify({})
        });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();
        if (!data.job_id) throw new Error('No job ID returned');

        document.getElementById('result').textContent =        // ✅ FIX 16
          `Submitted: ${data.job_id}`;
        jobIds.push(data.job_id);
        pollJob(data.job_id);
      } catch (err) {
        document.getElementById('result').textContent = `Error: ${err.message}`;
      }
    }

    async function pollJob(id, attempts = 0) {                 // ✅ FIX 18
      const MAX_ATTEMPTS = 30;
      if (attempts >= MAX_ATTEMPTS) {
        renderJob(id, 'timed out');
        return;
      }
      try {                                                     // ✅ FIX 15
        const res = await fetch(`/status/${id}`);
        if (!res.ok) throw new Error(`Status check failed: ${res.status}`);
        const data = await res.json();
        renderJob(id, data.status ?? 'unknown');
        if (!TERMINAL_STATES.includes(data.status)) {          // ✅ FIX 17
          setTimeout(() => pollJob(id, attempts + 1), 2000);   // ✅ FIX 18
        }
      } catch (err) {
        renderJob(id, `error: ${err.message}`);
      }
    }

    function renderJob(id, status) {
      let el = document.getElementById(id);
      if (!el) {
        el = document.createElement('div');
        el.className = 'job';
        el.id = id;
        document.getElementById('jobs').appendChild(el);
      }
      el.className = `job ${status}`;
      el.textContent = `Job ${id.substring(0, 8)}... — ${status}`; // ✅ FIX 16
    }
  </script>
</body>
</html>
